replicaCount: 2

image:
  repository: subscription-service

service:
  type: ClusterIP
  port: 8080

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits: { cpu: 500m, memory: 256Mi }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

env:
  DB_SCHEMA: subscription

probes:
  liveness: { path: /health, initialDelaySeconds: 5, periodSeconds: 10 }
  readiness: { path: /ready, initialDelaySeconds: 10, periodSeconds: 10 }

networkPolicy:
  ingressFrom:
    - bot-service
    - notification-service
  egressTo:
    - postgresql
